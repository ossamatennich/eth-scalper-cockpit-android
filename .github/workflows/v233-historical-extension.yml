      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: research/v233_historical/requirements-research.txt

      - name: Install research dependencies
        working-directory: research/v233_historical
        run: python -m pip install -r requirements-research.txt

      - name: Verify locked protocol hashes
        working-directory: research/v233_historical
        run: |
          sha256sum -c protocol/LOCKED_ARCHITECTURES_V2.sha256
          sha256sum -c protocol/LOCKED_CRITERIA_V2.sha256

      - name: Run deterministic tests
        working-directory: research/v233_historical
        run: pytest -q

      - name: Build official pre-holdout corpus
        working-directory: research/v233_historical
        run: |
          python src/binance_historical_extension.py \
            --output data/extended \
            --raw-dir data/extended/raw

      - name: Verify corpus integrity and holdout firewall
        working-directory: research/v233_historical
        run: |
          python - <<'PY_VERIFY'
          import json
          from pathlib import Path
          a = json.loads(Path('data/extended/EXTENDED_CORPUS_AUDIT.json').read_text())
          assert a['status'] == 'PASS'
          assert a['archive_count'] == 130
          assert a['one_hour']['rows'] == 47448
          assert a['four_hour_native']['rows'] == 11862
          assert a['one_hour']['missing_count'] == 0
          assert a['four_hour_native']['missing_count'] == 0
          assert a['one_hour']['invalid_ohlcv_count'] == 0
          assert a['four_hour_native']['invalid_ohlcv_count'] == 0
          assert a['four_hour_crosscheck']['price_mismatch_rows'] == 0
          assert a['four_hour_crosscheck']['volume_mismatch_rows'] == 0
          assert a['sealed_holdout_not_requested']['start'].startswith('2026-06-01')
          assert a['sealed_holdout_not_requested']['end_exclusive'].startswith('2026-07-17')
          PY_VERIFY

      - name: Run locked annual and monthly nested validation
        working-directory: research/v233_historical
        run: |
          python src/v233_historical_nested_validation.py \
            data/extended/ETHUSDT_UM_1h_2021-01-01_2026-05-31.csv.gz \
            --output results/historical \
            --protocol-dir protocol

      - name: Read pre-holdout authorization
        id: gate
        working-directory: research/v233_historical
        shell: bash
        run: |
          set -euo pipefail
          AUTH=$(jq -r '.authorized' results/historical/HOLDOUT_OPEN_AUTHORIZATION.json)
          COUNT=$(jq -r '.candidate_count' results/historical/HOLDOUT_OPEN_AUTHORIZATION.json)
          echo "authorized=$AUTH" >> "$GITHUB_OUTPUT"
          echo "candidate_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Pre-holdout authorized=$AUTH candidate_count=$COUNT"

      - name: Restore persistent one-time holdout state
        if: steps.gate.outputs.authorized == 'true' && steps.gate.outputs.candidate_count == '1'
        uses: actions/cache@v4
        with:
          path: |
            research/v233_historical/.holdout_once
            research/v233_historical/results/holdout
          key: v233-holdout-opened-2026-07-17-gate2

      - name: Open sealed holdout once only when exactly one candidate passes
        if: steps.gate.outputs.authorized == 'true' && steps.gate.outputs.candidate_count == '1'
        working-directory: research/v233_historical
        shell: bash
        run: |
          set -euo pipefail
          if test -f .holdout_once/OPENED.json; then
            echo 'Persistent marker restored: the holdout will not be opened again.'
            test -f results/holdout/FINAL_STRICT_DECISION.json
          else
            python src/v233_open_holdout_once.py \
              --authorization results/historical/HOLDOUT_OPEN_AUTHORIZATION.json \
              --preholdout-corpus data/extended/ETHUSDT_UM_1h_2021-01-01_2026-05-31.csv.gz \
              --output results/holdout \
              --marker .holdout_once/OPENED.json
          fi

      - name: Select final strict decision
        working-directory: research/v233_historical
        shell: bash
        run: |
          set -euo pipefail
          AUTH=$(jq -r '.authorized' results/historical/HOLDOUT_OPEN_AUTHORIZATION.json)
          COUNT=$(jq -r '.candidate_count' results/historical/HOLDOUT_OPEN_AUTHORIZATION.json)
          if test "$AUTH" = true && test "$COUNT" = 1; then
            cp results/holdout/FINAL_STRICT_DECISION.json results/FINAL_STRICT_DECISION.json
          else
            cp results/historical/PREHOLDOUT_STRICT_DECISION.json results/FINAL_STRICT_DECISION.json
          fi
          test "$(jq -r '.android_integration_allowed' results/FINAL_STRICT_DECISION.json)" = false
          test "$(jq -r '.research_only' results/FINAL_STRICT_DECISION.json)" = true

      - name: Build verifiable result package
        working-directory: research/v233_historical
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deliverable/results deliverable/protocol deliverable/src deliverable/tests
          cp -r results/historical deliverable/results/
          if test -d results/holdout; then cp -r results/holdout deliverable/results/; fi
          cp results/FINAL_STRICT_DECISION.json deliverable/results/
          cp data/extended/EXTENDED_CORPUS_AUDIT.json deliverable/results/
          cp data/extended/ETHUSDT_UM_1h_2021-01-01_2026-05-31.csv.gz deliverable/results/
          cp data/extended/ETHUSDT_UM_4h_native_2021-01-01_2026-05-31.csv.gz deliverable/results/
          cp data/extended/ETHUSDT_UM_4h_derived_2021-01-01_2026-05-31.csv.gz deliverable/results/
          cp -r protocol/. deliverable/protocol/
          cp -r src/. deliverable/src/
          cp -r tests/. deliverable/tests/
          cp requirements-research.txt deliverable/
          python - <<'PY_REPORT'
          import json, os
          from pathlib import Path
          d = json.loads(Path('results/FINAL_STRICT_DECISION.json').read_text())
          auth = json.loads(Path('results/historical/HOLDOUT_OPEN_AUTHORIZATION.json').read_text())
          audit = json.loads(Path('data/extended/EXTENDED_CORPUS_AUDIT.json').read_text())
          meta = {
              'workflow_run_id': os.environ.get('GITHUB_RUN_ID'),
              'workflow_run_attempt': os.environ.get('GITHUB_RUN_ATTEMPT'),
              'source_commit': os.environ.get('GITHUB_SHA'),
              'embedded_payload_sha256': '3725f9a878ee74f4d11cbd03d0c0e0bfdb824c8fd285fe5211245e48349910a3',
              'corpus_status': audit['status'],
              'preholdout_candidate_count': auth['candidate_count'],
              'holdout_authorized': auth['authorized'],
              'holdout_opened': d.get('holdout_opened', False),
              'stable': d.get('stable', False),
              'research_only': d.get('research_only', True),
              'android_integration_allowed': d.get('android_integration_allowed', False),
          }
          Path('deliverable/results/RUN_METADATA.json').write_text(json.dumps(meta, indent=2))
          summary = f"""# ETH v2.33 — décision stricte
          
          - stable={str(meta['stable']).lower()}
          - research_only={str(meta['research_only']).lower()}
          - holdout_authorized={str(meta['holdout_authorized']).lower()}
          - holdout_opened={str(meta['holdout_opened']).lower()}
          - android_integration_allowed={str(meta['android_integration_allowed']).lower()}
          - corpus_status={meta['corpus_status']}
          - preholdout_candidate_count={meta['preholdout_candidate_count']}
          - source_commit={meta['source_commit']}
          - workflow_run_id={meta['workflow_run_id']}
          """
          Path('deliverable/RESULT_SUMMARY.md').write_text(summary)
          PY_REPORT
          (cd deliverable && find . -type f -print0 | sort -z | xargs -0 sha256sum > MANIFEST_SHA256.txt)
          zip -qr ETH_V233_HISTORICAL_RESULTS.zip deliverable
          sha256sum ETH_V233_HISTORICAL_RESULTS.zip > ETH_V233_HISTORICAL_RESULTS.zip.sha256

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETH_V233_HISTORICAL_RESULTS
          path: |
            research/v233_historical/ETH_V233_HISTORICAL_RESULTS.zip
            research/v233_historical/ETH_V233_HISTORICAL_RESULTS.zip.sha256
            research/v233_historical/results/FINAL_STRICT_DECISION.json
            research/v233_historical/deliverable/RESULT_SUMMARY.md
          if-no-files-found: error
          retention-days: 30

      - name: Publish results to dedicated research branch
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH=/tmp/v233-publish
          rm -rf "$PUBLISH"
          mkdir -p "$PUBLISH"
          cp research/v233_historical/ETH_V233_HISTORICAL_RESULTS.zip "$PUBLISH/"
          cp research/v233_historical/ETH_V233_HISTORICAL_RESULTS.zip.sha256 "$PUBLISH/"
          cp research/v233_historical/results/FINAL_STRICT_DECISION.json "$PUBLISH/"
          cp research/v233_historical/data/extended/EXTENDED_CORPUS_AUDIT.json "$PUBLISH/"
          cp research/v233_historical/results/historical/HOLDOUT_OPEN_AUTHORIZATION.json "$PUBLISH/"
          cp research/v233_historical/deliverable/RESULT_SUMMARY.md "$PUBLISH/README.md"
          cp research/v233_historical/deliverable/MANIFEST_SHA256.txt "$PUBLISH/"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout --orphan v233-results-publish
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx
          cp -r "$PUBLISH"/. .
          git add .
          git commit -m "Publish ETH v2.33 historical results run $GITHUB_RUN_ID"
          git push --force origin HEAD:research-results-v233-historical
