name: ETH v2.33 historical locked validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/v233-historical-extension.yml'

permissions:
  contents: write

concurrency:
  group: v233-historical-single-holdout-open
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: '1'
  PIP_DISABLE_PIP_VERSION_CHECK: '1'
  RESEARCH_DIR: research/v233_historical

