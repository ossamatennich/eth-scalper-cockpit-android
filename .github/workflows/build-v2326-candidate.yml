name: Build APK v2.32.6 Candidate

on:
  push:
    branches:
      - agent/v2.32.6-candidate

permissions:
  contents: read

jobs:
  build-apk:
    name: Compile v2.32.6 APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@v4

      - name: Configure Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configure Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Compile debug APK
        run: ./gradlew --no-daemon clean assembleDebug

      - name: Locate generated APK
        run: find app/build/outputs/apk -type f -name "*.apk" -print

      - name: Upload v2.32.6 APK
        uses: actions/upload-artifact@v4
        with:
          name: ETH-Scalper-v2.32.6-candidate
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
