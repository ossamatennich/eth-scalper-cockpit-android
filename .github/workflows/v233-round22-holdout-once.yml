name: ETH v2.33 Round 22 single holdout validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/v233-round22-holdout-once.yml'

permissions:
  contents: write

concurrency:
  group: v233-round22-single-holdout-open
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: '1'
  RESEARCH_DIR: research/v233_round22_holdout
  RESULTS_BRANCH: research-results-v233-round22-holdout

jobs:
  frozen-holdout-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Enforce persistent one-time holdout guard
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin "refs/heads/$RESULTS_BRANCH" >/dev/null 2>&1; then
            echo "The persistent holdout results branch already exists. Refusing a second opening."
            exit 1
          fi

      - name: Materialize frozen Round 22 package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RESEARCH_DIR"
          cat > /tmp/v233_round22_holdout.b64 <<'ROUND22_PAYLOAD'
          
          ROUND22_PAYLOAD
          base64 -d /tmp/v233_round22_holdout.b64 | tar -xzf - -C "$RESEARCH_DIR"
          rm -f /tmp/v233_round22_holdout.b64
          (cd "$RESEARCH_DIR" && sha256sum -c BUNDLE_MANIFEST_SHA256.txt)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install locked research dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'numpy==2.1.3' 'pandas==2.2.3' 'numba==0.61.0'

      - name: Open authorized holdout exactly once with frozen parameters
        shell: bash
        run: |
          set -euo pipefail
          cd "$RESEARCH_DIR"
          python round22_holdout_once_runner.py --bundle . --out results | tee HOLDOUT_RUN_STDOUT.json

      - name: Build verifiable result package
        shell: bash
        run: |
          set -euo pipefail
          cd "$RESEARCH_DIR"
          find results -type f ! -name MANIFEST_SHA256.txt -print0 | sort -z | xargs -0 sha256sum > results/MANIFEST_SHA256.txt
          zip -qr ETH_V233_ROUND22_HOLDOUT_RESULTS.zip results BUNDLE_MANIFEST_SHA256.txt ROUND22_ARCHITECTURE_LOCKED.json ROUND22_CRITERIA_LOCKED.json LOCKED_CRITERIA_V2.json central_config.json ROUND22_PREHOLDOUT_DECISION.json HOLDOUT_OPEN_AUTHORIZATION.json HOLDOUT_RUN_STDOUT.json
          sha256sum ETH_V233_ROUND22_HOLDOUT_RESULTS.zip > ETH_V233_ROUND22_HOLDOUT_RESULTS.zip.sha256

      - name: Upload holdout artifact
        uses: actions/upload-artifact@v4
        with:
          name: ETH_V233_ROUND22_HOLDOUT_RESULTS
          path: |
            research/v233_round22_holdout/ETH_V233_ROUND22_HOLDOUT_RESULTS.zip
            research/v233_round22_holdout/ETH_V233_ROUND22_HOLDOUT_RESULTS.zip.sha256
            research/v233_round22_holdout/results/FINAL_STRICT_DECISION.json
            research/v233_round22_holdout/results/HOLDOUT_CORPUS_AUDIT.json
            research/v233_round22_holdout/results/HOLDOUT_OPENED_MARKER.json
            research/v233_round22_holdout/results/README.md
          if-no-files-found: error
          retention-days: 30

      - name: Publish immutable holdout results branch
        shell: bash
        run: |
          set -euo pipefail
          PUBLISH=/tmp/v233-round22-publish
          rm -rf "$PUBLISH"
          mkdir -p "$PUBLISH"
          cp "$RESEARCH_DIR/ETH_V233_ROUND22_HOLDOUT_RESULTS.zip" "$PUBLISH/"
          cp "$RESEARCH_DIR/ETH_V233_ROUND22_HOLDOUT_RESULTS.zip.sha256" "$PUBLISH/"
          cp -r "$RESEARCH_DIR/results/." "$PUBLISH/"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout --orphan v233-round22-holdout-results
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx
          cp -r "$PUBLISH/." .
          git add .
          git commit -m "Publish ETH v2.33 Round 22 one-time holdout results run $GITHUB_RUN_ID"
          git push origin HEAD:"$RESULTS_BRANCH"
